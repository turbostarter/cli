name: CI / Tests

on:
  push:
    branches: ["*"]
  merge_group:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24.x
jobs:
  checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: 🖌️ Format
            run: pnpm run format
          - name: 🛻 Lint
            run: pnpm run lint
          - name: 📝 Typecheck
            run: pnpm run typecheck
    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v6

      - name: 🔨 Setup
        uses: ./.github/workflows/setup
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: ▶️ Run
        run: ${{ matrix.run }}
